# Medication Reminder - dashboard card.
#
# Because doses are data-driven, the zero-maintenance option is an auto-entities
# card (HACS: https://github.com/thomasloven/lovelace-auto-entities) that shows
# every input_boolean.med_* automatically. Add a dose and it appears, no card
# edits. `last-changed` gives a free "given X ago" readout, and you can toggle a
# dose manually here (which suppresses its nag).

type: custom:auto-entities
card:
  type: entities
  title: 💊 Medication
  show_header_toggle: false
filter:
  include:
    - entity_id: "input_boolean.med_*"
      secondary_info: last-changed
sort:
  method: friendly_name

# ---------------------------------------------------------------------------
