# Medication Reminder — Home Assistant package
# https://github.com/magikh0e/ha-medication-reminder
#
# Drop this file in your packages/ directory. Enable packages once in
# configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then edit the dose times, medication names, and the notify service below.
# (Prefer to paste into your existing configuration.yaml / automations.yaml
# instead? See the README "Manual install" section.)

input_boolean:
  med_6am:
    name: "Medication — 6 AM (Meds A, B, C)"
    icon: mdi:pill
  med_2pm:
    name: "Medication — 2 PM (Meds A, C)"
    icon: mdi:pill
  med_6pm:
    name: "Medication — 6 PM (Med B)"
    icon: mdi:pill
  med_10pm:
    name: "Medication — 10 PM (Meds A, C)"
    icon: mdi:pill

# Reminders fan out to everyone in this group. Home Assistant already syncs the
# GIVEN state (the input_booleans) across all Companion apps in real time — the
# group only fans out the push notification to multiple people.
notify:
  - platform: group
    name: caretakers
    services:
      - service: mobile_app_phone            # replace with your phone's notify service
      # - service: mobile_app_partner_phone  # add more caretakers here

automation:
  # Reset all doses to "not given" at the start of each day.
  - id: med_reminder_reset
    alias: "Medication — Daily reset"
    trigger:
      - platform: time
        at: "00:01:00"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.med_6am
            - input_boolean.med_2pm
            - input_boolean.med_6pm
            - input_boolean.med_10pm
    mode: single

  # Every 15 min: for each dose past its time, within the nag window, and not yet
  # given -> actionable reminder naming that dose's meds. Restart-proof (it simply
  # re-evaluates each tick rather than running a long-lived loop).
  - id: med_reminder_nag
    alias: "Medication — Reminder & nag"
    trigger:
      - platform: time_pattern
        minutes: "/15"
    variables:
      nag_minutes: 45        # nag for the first 45 min; missed-alert takes over at +60
      doses:
        - { bool: input_boolean.med_6am,  time: "06:00", key: "6am",  label: "6 AM",  meds: "Medication A, Medication B, and Medication C" }
        - { bool: input_boolean.med_2pm,  time: "14:00", key: "2pm",  label: "2 PM",  meds: "Medication A and Medication C" }
        - { bool: input_boolean.med_6pm,  time: "18:00", key: "6pm",  label: "6 PM",  meds: "Medication B" }
        - { bool: input_boolean.med_10pm, time: "22:00", key: "10pm", label: "10 PM", meds: "Medication A and Medication C" }
    action:
      - repeat:
          for_each: "{{ doses }}"
          sequence:
            - variables:
                mins_since: "{{ (now() - today_at(repeat.item.time)).total_seconds() / 60 }}"
            - if:
                - condition: template
                  value_template: >-
                    {{ is_state(repeat.item.bool, 'off')
                       and mins_since >= 0
                       and mins_since <= nag_minutes }}
              then:
                - action: notify.caretakers
                  data:
                    title: "💊 Medication — {{ repeat.item.label }}"
                    message: "Give {{ repeat.item.meds }}. Has it been given?"
                    data:
                      tag: "med_{{ repeat.item.key }}"
                      actions:
                        - action: "MED_GIVEN_{{ repeat.item.key }}"
                          title: "✅ Mark given"
    mode: single

  # Tapping "Mark given" (from any phone) flips that dose on and clears the
  # notification on every device.
  - id: med_reminder_mark_given
    alias: "Medication — Mark given from notification"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.action.startswith('MED_GIVEN_') }}"
    variables:
      key: "{{ trigger.event.data.action.split('_')[-1] }}"
      bool_map:
        "6am": input_boolean.med_6am
        "2pm": input_boolean.med_2pm
        "6pm": input_boolean.med_6pm
        "10pm": input_boolean.med_10pm
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: "{{ bool_map[key] }}"
      - action: notify.caretakers
        data:
          message: "clear_notification"
          data:
            tag: "med_{{ key }}"
    mode: parallel

  # Missed-dose escalation at each dose's window-end (dose time + nag window):
  # time-sensitive push to everyone + a spoken TTS backstop naming the missed meds.
  - id: med_reminder_missed
    alias: "Medication — Missed dose alert"
    trigger:
      - platform: time
        at: "07:00:00"
        id: "6am"
      - platform: time
        at: "15:00:00"
        id: "2pm"
      - platform: time
        at: "19:00:00"
        id: "6pm"
      - platform: time
        at: "23:00:00"
        id: "10pm"
    variables:
      bool_map:
        "6am": input_boolean.med_6am
        "2pm": input_boolean.med_2pm
        "6pm": input_boolean.med_6pm
        "10pm": input_boolean.med_10pm
      meds_map:
        "6am": "Medication A, Medication B, and Medication C"
        "2pm": "Medication A and Medication C"
        "6pm": "Medication B"
        "10pm": "Medication A and Medication C"
      dose_bool: "{{ bool_map[trigger.id] }}"
      dose_meds: "{{ meds_map[trigger.id] }}"
    condition:
      - condition: template
        value_template: "{{ is_state(dose_bool, 'off') }}"
    action:
      - action: notify.caretakers
        data:
          title: "⚠️ MISSED Medication — {{ trigger.id }}"
          message: "The {{ trigger.id }} dose ({{ dose_meds }}) was NOT marked given. Please check on it."
          data:
            tag: "med_missed_{{ trigger.id }}"
            priority: high
            ttl: 0
            push:
              interruption-level: time-sensitive
            actions:
              - action: "MED_GIVEN_{{ trigger.id }}"
                title: "✅ Mark given"
      # Optional spoken backstop — adjust the media_player / tts engine, or remove.
      - action: tts.speak
        target:
          entity_id: tts.home_assistant_cloud
        data:
          media_player_entity_id: media_player.home_assistant_voice
          message: "Attention. The {{ trigger.id }} medication dose, {{ dose_meds }}, has not been given."
    mode: single
