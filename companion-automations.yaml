# Companion automations for the Medication Reminder integration.
#
# The integration creates a switch per dose (on = given today), handles the
# daily reset, and stores each patient's notify target. These automations do the
# reminders, nagging, and missed-dose escalation by reading EVERY dose switch's
# attributes (patient, dose_time, medications, notify_service). Add a patient or
# dose in the UI and these pick it up automatically; no edits needed here.
#
# Cadence: reminders fire on a 5-minute tick (so the first ping is prompt),
# re-nag roughly every nag_interval minutes, and escalate once at the window-end.
# Each patient's reminders go to the notify target chosen in the UI
# (state_attr notify_service); default_notify is only a fallback.

- id: med_reminder
  alias: "Medication - Reminders & missed-dose escalation"
  trigger:
    - platform: time_pattern
      minutes: "/5"
  variables:
    nag_minutes: 45        # how long to keep reminding after dose time
    nag_interval: 15       # re-remind roughly every this many minutes
    default_notify: caretakers
  action:
    - repeat:
        for_each: >
          {{ states.switch
             | selectattr('attributes.medications', 'defined')
             | map(attribute='entity_id') | list }}
        sequence:
          - variables:
              ent: "{{ repeat.item }}"
              oid: "{{ ent.split('.')[1] }}"
              given: "{{ is_state(ent, 'on') }}"
              dtime: "{{ state_attr(ent, 'dose_time') }}"
              patient: "{{ state_attr(ent, 'patient') }}"
              meds: "{{ state_attr(ent, 'medications') }}"
              notify_service: "{{ state_attr(ent, 'notify_service') or default_notify }}"
              mins_since: "{{ (now() - today_at(dtime)).total_seconds() / 60 }}"
              clock: "{{ as_timestamp(today_at(dtime)) | timestamp_custom('%-I:%M %p') }}"
          - choose:
              # Reminder: prompt first ping, then about every nag_interval minutes
              - conditions:
                  - "{{ not given and mins_since >= 0 and mins_since < nag_minutes and (mins_since % nag_interval) < 5 }}"
                sequence:
                  - action: "notify.{{ notify_service }}"
                    data:
                      title: "💊 {{ patient }} ({{ clock }})"
                      message: "Give {{ patient }}'s medication: {{ meds }}. Has it been given?"
                      data:
                        tag: "med_{{ oid }}"
                        actions:
                          - action: "MED_GIVEN_{{ oid }}"
                            title: "✅ Mark given"
              # Missed: fires once at the first tick at/after the window-end
              - conditions:
                  - "{{ not given and mins_since >= nag_minutes and mins_since < nag_minutes + 5 }}"
                sequence:
                  - action: "notify.{{ notify_service }}"
                    data:
                      title: "⚠️ MISSED: {{ patient }} ({{ clock }})"
                      message: "{{ patient }}'s {{ clock }} dose ({{ meds }}) was NOT marked given. Please check on it."
                      data:
                        tag: "med_missed_{{ oid }}"
                        priority: high
                        ttl: 0
                        push:
                          interruption-level: time-sensitive
                        actions:
                          - action: "MED_GIVEN_{{ oid }}"
                            title: "✅ Mark given"
  mode: single

- id: med_reminder_mark_given
  alias: "Medication - Mark given from notification"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
  condition:
    - "{{ trigger.event.data.action.startswith('MED_GIVEN_') }}"
  variables:
    oid: "{{ trigger.event.data.action | replace('MED_GIVEN_', '') }}"
    ent: "switch.{{ oid }}"
    notify_service: "{{ state_attr(ent, 'notify_service') or 'caretakers' }}"
  action:
    - action: switch.turn_on
      target:
        entity_id: "{{ ent }}"
    - action: "notify.{{ notify_service }}"
      data:
        message: "clear_notification"
        data:
          tag: "med_{{ oid }}"
    - action: "notify.{{ notify_service }}"
      data:
        message: "clear_notification"
        data:
          tag: "med_missed_{{ oid }}"
  mode: parallel
